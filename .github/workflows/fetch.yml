on:
  schedule:
    - cron: "0 */12 * * *"   # 每 12 小時 (UTC)，也就是台灣早上 8 點、晚上 8 點
  workflow_dispatch:          # 手動觸發

permissions:
  contents: write             # 允許 commit & push

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v3
        with:
          ref: main
          fetch-depth: 0

      - name: Fetch and Save feed
        run: |
          mkdir -p data
          curl -s "https://raw.githubusercontent.com/openphish/public_feed/refs/heads/main/feed.txt" \
            -o "data/feed_$(TZ=Asia/Taipei date +'%Y%m%d_%H%M%S').txt"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git commit -m "Auto update feed $(TZ=Asia/Taipei date +'%Y-%m-%d %H:%M:%S')"
          git push origin HEAD:main
